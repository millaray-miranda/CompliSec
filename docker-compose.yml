version: '3.8'

services:
  database:
    image: postgres:15-alpine
    container_name: complisec_db
    environment:
      POSTGRES_USER: complisec_user
      POSTGRES_PASSWORD: complisec_password
      POSTGRES_DB: complisec
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - complisec_network

  bff:
    build:
      context: ./bff
      dockerfile: Dockerfile
    container_name: complisec_bff
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=development
      - PORT=4000
      - DB_HOST=database
      - DB_PORT=5432
      - DB_USER=complisec_user
      - DB_PASSWORD=complisec_password
      - DB_NAME=complisec
    depends_on:
      - database
    volumes:
      - ./bff/src:/app/src
    networks:
      - complisec_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: complisec_frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - REACT_APP_BFF_URL=http://bff:4000
    depends_on:
      - bff
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    networks:
      - complisec_network

networks:
  complisec_network:
    driver: bridge

volumes:
  pgdata:

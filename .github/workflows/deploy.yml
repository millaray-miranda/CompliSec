name: Deploy CompliSec to AWS

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY_FRONTEND: complisec-frontend
  ECR_REPOSITORY_BFF: complisec-bff
  ECS_CLUSTER: complisec-cluster
  ECS_SERVICE_FRONTEND: complisec-frontend-service
  ECS_SERVICE_BFF: complisec-bff-service

jobs:
  deploy:
    name: Build and Push to ECR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build, tag, and push BFF image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd bff
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY_BFF:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_BFF:$IMAGE_TAG

      - name: Build, tag, and push Frontend image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd frontend
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY_FRONTEND:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_FRONTEND:$IMAGE_TAG

      # Nota: Aquí se agregarían los pasos para actualizar la Task Definition de ECS
      # y forzar un nuevo despliegue del servicio (aws ecs update-service)
